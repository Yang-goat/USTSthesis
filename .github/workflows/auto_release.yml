name: 自动创建 Release

on:
  pull_request:
    types:
      - closed
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  create_release:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 解析版本号和描述
        id: parse
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            body="$PR_BODY"
          else
            body="$HEAD_MESSAGE"
          fi

          # 第一行非空行作为版本号
          version=$(printf "%s\n" "$body" | sed -n '/./{s/\r//;p;q}')

          # 第二行开始作为发布说明
          description=$(printf "%s\n" "$body" | tail -n +2)

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "description<<EOF" >> "$GITHUB_OUTPUT"
          echo "$description" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 校验版本号
        run: |
          version='${{ steps.parse.outputs.version }}'
          if [ -z "$version" ]; then
            echo "错误：第一行为空，无法作为版本号。"
            exit 1
          fi

      - name: 生成发布说明文件
        run: |
          cat > release_notes.md <<'EOF'
          ${{ steps.parse.outputs.description }}
          EOF

      - name: 确定目标提交 SHA
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          MERGE_COMMIT_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && [ -n "$MERGE_COMMIT_SHA" ]; then
            echo "sha=$MERGE_COMMIT_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: 检查 Release 是否已存在
        id: exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version='${{ steps.parse.outputs.version }}'
          if gh release view "$version" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 创建 GitHub Release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version='${{ steps.parse.outputs.version }}'
          target_sha='${{ steps.target.outputs.sha }}'

          gh release create "$version" \
            --title "$version" \
            --notes-file release_notes.md \
            --target "$target_sha"

      - name: 已存在则跳过
        if: steps.exists.outputs.exists == 'true'
        run: |
          echo "Release ${{ steps.parse.outputs.version }} 已存在，跳过创建。"